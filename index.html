<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jester</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body {
            font-family: "Montserrat Alternates", sans-serif;
            background: black;
            color: white;
        }

        .title {
            display: flex;
            justify-content: center;
            font-size: 45px;
        }
        .container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: 40px;
            width: 800px; /* keeps layout stable */
        }
        
        /* base card style */
        .container div {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: black;
            border: 4px solid white;
            width: 250px;
            height: 250px;
            padding: 20px;
            border-radius: 20px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        
        .container div li {
            color:black;
        }
        .container div ul {
            color:black;
        }
        .container div p {
            color:black;
        }

        /* LEFT CARD — hidden behind middle */
        .card-left {
            position: absolute;
            left: -12.5%;      /* show only 1/8 of the card */
            top: 0;
            opacity: 0.6;      /* subtle behind effect */
            z-index: 1;
        }
        
        /* MIDDLE CARD — main card */
        .card-middle {
            z-index: 2;
        }
        
        /* RIGHT CARD — normal */
        .card-right {
            margin-left: 280px; /* push it to the right of middle card */
            z-index: 1;
        }
        
        /* hover effect */
        .container div:hover {
            transform: scale(1.05);
            background: white;
            color: black;
        }

        
    </style>
</head>

<body>

    <div class="title">
        <h1>this is jester.</h1>
    </div>

    <div class="container">
        <div class="card-left">
        </div>
        <div class="card-middle">
            <h3>projects</h3>
            <ul><li>currently making a bunch of pygame/python games rn in vscode</li><li>also making edits in capcut, may make a social media account and post something</li></ul>
        </div>
        <div class="card-right">
        </div>
    </div>
</body>
</html>
